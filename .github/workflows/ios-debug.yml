name: "Unsigned IPA Build"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_unsigned:
    runs-on: macos-26
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.1'

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare Brew
        run: brew install boost

      - name: Prepare LibTorrent
        run: ./Submodules/LibTorrent-Swift/make.sh

      - name: Create dummy GoogleService-Info.plist
        run: |
          cat > iTorrent/Core/Assets/GoogleService-Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>API_KEY</key>
              <string>dummy</string>
              <key>BUNDLE_ID</key>
              <string>com.xitrix.iTorrent</string>
              <key>CLIENT_ID</key>
              <string>dummy</string>
              <key>REVERSED_CLIENT_ID</key>
              <string>dummy</string>
              <key>PROJECT_ID</key>
              <string>dummy</string>
              <key>STORAGE_BUCKET</key>
              <string>dummy</string>
              <key>GCM_SENDER_ID</key>
              <string>000000000000</string>
              <key>GOOGLE_APP_ID</key>
              <string>1:000000000000:ios:0000000000000000</string>
          </dict>
          </plist>
          PLIST

      - name: Build unsigned archive
        run: |
          xcodebuild \
            -workspace iTorrent.xcworkspace \
            -scheme "iTorrent" \
            -archivePath $RUNNER_TEMP/itorrent.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean archive

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find $RUNNER_TEMP/itorrent.xcarchive -name "*.app" | head -1)
          mkdir -p $RUNNER_TEMP/Payload
          cp -r "$APP_PATH" $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP
          zip -r iTorrent-unsigned.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: iTorrent-unsigned
          path: ${{ runner.temp }}/iTorrent-unsigned.ipa
          retention-days: 30
